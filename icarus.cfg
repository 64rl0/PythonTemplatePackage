# icarus.cfg

package:
  - name: ProjectNameHere
  - language: ProjectLanguageHere

build-system:
  - runtime: icarus-python3
  - build-root: build

icarus-python3:
  - python:
    - '3.13'
    - '3.12'
  - python-default: '3.13'
  - requirements:
    - 'requirements.txt'

icarus-cdk:
  - pass: 'Not Implemented Yet'

ignore:
  - '.icarus/'
  - '.git/'
  - '.github/'
  - '.idea/'
  - '**/.mypy_cache/'
  - '**/.pytest_cache/'
  - '**/__pycache__/'
  - '**/*.egg-info/'
  - 'build/'
  - 'dist/'
